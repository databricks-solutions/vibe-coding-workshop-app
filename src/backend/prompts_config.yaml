# -----------------------------------------------------------------------------
# PREREQUISITES (Static UI configuration)
# -----------------------------------------------------------------------------
prerequisites:
  - id: 1
    title: "Install Package Manager"
    description: |
      **macOS:** Homebrew is required to install the tools below. If you already have it, run the upgrade command to ensure it is up to date.
      
      **Windows:** winget (Windows Package Manager) is pre-installed on Windows 10 (1809+) and Windows 11. No additional setup needed.
    commands:
      - label: "Install Homebrew (macOS)"
        cmd: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
        os: macos
      - label: "Upgrade Homebrew (macOS)"
        cmd: "brew update && brew upgrade"
        os: macos
      - label: "Verify Homebrew (macOS)"
        cmd: "brew --version"
        os: macos
      - label: "Verify winget (Windows)"
        cmd: "winget --version"
        os: windows
    icon: "terminal"
    icon_color: "purple"
    is_optional: false
    links:
      - label: "Homebrew (macOS)"
        url: "https://brew.sh"
        color: "purple"
      - label: "winget Docs (Windows)"
        url: "https://learn.microsoft.com/en-us/windows/package-manager/winget/"
        color: "blue"

  - id: 2
    title: "Install Git"
    description: |
      Git is required for version control and cloning the workshop repository.
      If already installed, use the upgrade command to ensure you have the latest version.
    commands:
      - label: "Install (macOS - Homebrew)"
        cmd: "brew install git"
        os: macos
      - label: "Upgrade (macOS - Homebrew)"
        cmd: "brew upgrade git"
        os: macos
      - label: "Install (Windows)"
        cmd: "winget install --id Git.Git -e --source winget"
        os: windows
      - label: "Upgrade (Windows)"
        cmd: "winget upgrade --id Git.Git -e --source winget"
        os: windows
      - label: "Verify Installation"
        cmd: "git --version"
    icon: "GitBranch"
    icon_color: "orange"
    is_optional: false
    links:
      - label: "Download Git"
        url: "https://git-scm.com/downloads"
        color: "orange"
      - label: "Git Installation Guide"
        url: "https://git-scm.com/book/en/v2/Getting-Started-Installing-Git"
        color: "blue"

  - id: 3
    title: "Install Python"
    description: |
      Python 3.8+ is required for the Databricks CLI and backend services.
      If already installed, use the upgrade command to update to the latest version.
    commands:
      - label: "Install (macOS - Homebrew)"
        cmd: "brew install python3"
        os: macos
      - label: "Upgrade (macOS - Homebrew)"
        cmd: "brew upgrade python3"
        os: macos
      - label: "Install (Windows)"
        cmd: "winget install --id Python.Python.3.12 -e --source winget"
        os: windows
      - label: "Upgrade (Windows)"
        cmd: "winget upgrade --id Python.Python.3.12 -e --source winget"
        os: windows
      - label: "Verify (macOS/Linux)"
        cmd: "python3 --version"
        os: macos
      - label: "Verify (Windows)"
        cmd: "python --version"
        os: windows
    icon: "terminal"
    icon_color: "yellow"
    is_optional: false
    links:
      - label: "Download Python"
        url: "https://www.python.org/downloads/"
        color: "yellow"
      - label: "Databricks Python Setup"
        url: "https://docs.databricks.com/en/dev-tools/cli/install.html#requirements"
        color: "green"

  - id: 4
    title: "Install Databricks CLI"
    description: |
      The Databricks CLI is used for workspace management and deployment.
      If already installed, use the upgrade command to update. Verify your version is **v0.285.0 or higher**.
    commands:
      - label: "Install (macOS/Linux - Homebrew)"
        cmd: "brew tap databricks/tap && brew install databricks"
        os: macos
      - label: "Upgrade (macOS/Linux - Homebrew)"
        cmd: "brew upgrade databricks"
        os: macos
      - label: "Install (Windows)"
        cmd: "winget install Databricks.DatabricksCLI"
        os: windows
      - label: "Upgrade (Windows)"
        cmd: "winget upgrade Databricks.DatabricksCLI"
        os: windows
      - label: "Verify Installation (must be v0.285.0 or higher)"
        cmd: "databricks --version"
    icon: "terminal"
    icon_color: "green"
    is_optional: false
    links:
      - label: "CLI Installation Guide"
        url: "https://docs.databricks.com/en/dev-tools/cli/install.html"
        color: "green"
      - label: "CLI Documentation"
        url: "https://docs.databricks.com/en/dev-tools/cli/index.html"
        color: "blue"

  - id: 5
    title: "Install Node.js"
    description: |
      Node.js is required for building and running the frontend application.
      The installer also includes npm (Node Package Manager). If already installed, use the upgrade command.
    commands:
      - label: "Install (macOS - Homebrew)"
        cmd: "brew install node"
        os: macos
      - label: "Upgrade (macOS - Homebrew)"
        cmd: "brew upgrade node"
        os: macos
      - label: "Install (Windows)"
        cmd: "winget install --id OpenJS.NodeJS.LTS -e --source winget"
        os: windows
      - label: "Upgrade (Windows)"
        cmd: "winget upgrade --id OpenJS.NodeJS.LTS -e --source winget"
        os: windows
      - label: "Verify Node"
        cmd: "node --version"
      - label: "Verify npm"
        cmd: "npm --version"
    icon: "terminal"
    icon_color: "green"
    is_optional: false
    links:
      - label: "Download Node.js"
        url: "https://nodejs.org/"
        color: "green"
      - label: "Node.js Installation Guide"
        url: "https://nodejs.org/en/download/package-manager"
        color: "blue"
      - label: "Troubleshooting Guide"
        url: "https://docs.npmjs.com/troubleshooting/common-errors"
        color: "orange"

  - id: 6
    title: "(Optional) Access to Figma"
    description: "For Option B (Rich UI Design), you'll need access to Figma for creating polished UI designs. This is optional if you plan to use Option A (Basic UI with AI Coding Assistant)."
    icon: "figma"
    icon_color: "pink"
    is_optional: true
    links:
      - label: "Figma"
        url: "https://figma.com"
        color: "pink"

