# -----------------------------------------------------------------------------
# PREREQUISITES (Static UI configuration)
# -----------------------------------------------------------------------------
prerequisites:
  - id: 1
    title: "Install Workshop Tools (One-Command Setup)"
    description: |
      Installs and upgrades everything you need in a single step: **Homebrew/winget**, **Git**, **Python 3**, **Node.js** (and **npm**), and the **Databricks CLI** (v0.285.0+).

      **macOS:** paste the command in Terminal.
      **Windows:** open **PowerShell as Administrator**, then paste the command.

      The script is safe to re-run — it upgrades anything already installed. After it finishes, restart your terminal and use the verify commands below to confirm everything is on your PATH.
    commands:
      - label: "macOS — install everything"
        cmd: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/databricks-solutions/vibe-coding-workshop-app/main/scripts/install-prerequisites.sh)"'
        os: macos
      - label: "Windows — install everything (run in elevated PowerShell)"
        cmd: 'powershell -NoProfile -ExecutionPolicy Bypass -Command "iwr -useb https://raw.githubusercontent.com/databricks-solutions/vibe-coding-workshop-app/main/scripts/install-prerequisites.ps1 | iex"'
        os: windows
      - label: "Verify Git"
        cmd: "git --version"
      - label: "Verify Python (macOS)"
        cmd: "python3 --version"
        os: macos
      - label: "Verify Python (Windows)"
        cmd: "python --version"
        os: windows
      - label: "Verify Node.js"
        cmd: "node --version"
      - label: "Verify npm"
        cmd: "npm --version"
      - label: "Verify Databricks CLI (must be v0.285.0 or higher)"
        cmd: "databricks --version"
    icon: "terminal"
    icon_color: "purple"
    is_optional: false
    links:
      - label: "View install-prerequisites.sh"
        url: "https://github.com/databricks-solutions/vibe-coding-workshop-app/blob/main/scripts/install-prerequisites.sh"
        color: "purple"
      - label: "View install-prerequisites.ps1"
        url: "https://github.com/databricks-solutions/vibe-coding-workshop-app/blob/main/scripts/install-prerequisites.ps1"
        color: "blue"
      - label: "Databricks CLI Docs"
        url: "https://docs.databricks.com/en/dev-tools/cli/install.html"
        color: "green"

  - id: 2
    title: "(Optional) Access to Figma"
    description: "For Option B (Rich UI Design), you'll need access to Figma for creating polished UI designs. This is optional if you plan to use Option A (Basic UI with AI Coding Assistant)."
    icon: "figma"
    icon_color: "pink"
    is_optional: true
    links:
      - label: "Figma"
        url: "https://figma.com"
        color: "pink"

